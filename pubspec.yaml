name: apllication
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  icons_launcher:

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

# ESTA SECCIÓN VA AL FINAL, FUERA DE TODO LO DEMÁS
icons_launcher:
  image_path: "assets/icons/app_icon.png"
  platforms:
    android:
      enable: true
      adaptive_icon_background: "#FFFFFF"
      adaptive_icon_foreground: "assets/icons/app_icon.png"
      adaptive_icon_foreground_inset: "0"
    ios:
      enable: true